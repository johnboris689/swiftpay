<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data</title>
<style>
body{font-family:system-ui;background:#f4fbff;padding:20px;}
.card{background:white;padding:20px;border-radius:15px;}
button{width:100%;padding:12px;background:#0ea5e9;color:white;border:none;}
</style>
</head>
<body>

<div class="card">
<h2>Buy Data</h2>
<button onclick="buy()">Buy 1GB</button>
<p id="msg"></p>
</div>

<script>
function buy(){
  msg.innerText="Processing data purchase...";
  setTimeout(()=>msg.innerText="Data activated successfully!",2000);
}
</script>

<script src="notify.js"></script><script src="nav.js"></script></body>
</html>
