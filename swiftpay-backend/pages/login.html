<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay Login</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background: linear-gradient(135deg,#38bdf8,#0ea5e9);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* card */
.card{
  width:90%;
  max-width:380px;
  background:rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius:24px;
  padding:25px;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
  margin:0;
  font-size:34px;
}

p{
  font-size:13px;
  opacity:0.9;
  line-height:1.4;
}

/* inputs */
input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  outline:none;
  background:rgba(255,255,255,0.18);
  color:white;
}

input::placeholder{
  color:#e6f7ff;
}

/* button */
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:white;
  color:#0ea5e9;
  font-weight:800;
  font-size:16px;
}

.footer{
  text-align:center;
  margin-top:12px;
  font-size:13px;
}

a{
  color:white;
  font-weight:700;
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

  <h1>SWIFTPAY</h1>
  <p>Welcome back! Login to continue using your SwiftPay account.</p>

  <input id="email" placeholder="Your Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Sign in</button>

  <div class="footer">
    Don't have an account? <a href="register.html">Create account</a>
  </div>

</div>

<script>
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("All fields required");
    return;
  }

  // simple local login flow (UI stable mode)
  localStorage.setItem("swiftpay_user", JSON.stringify({email}));

  alert("Login successful");

}
</script>

<script src="notify.js"></script>
</body>
</html>
