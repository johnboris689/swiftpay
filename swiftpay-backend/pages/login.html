<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay Login</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:380px;
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  text-align:center;
}

h1{
  color:#0ea5e9;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #e5e5e5;
  outline:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;
  font-weight:700;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
}

.msg{
  font-size:13px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h1>SWIFTPAY</h1>
  <p>Secure Banking Login</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="btn" onclick="login()">Login</button>

  <div class="msg" id="msg"></div>

  <p style="margin-top:10px;font-size:13px;">
    No account? <a href="register.html">Register</a>
  </p>
</div>

<script>
const API="/api";

async function login(){
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");

  msg.innerText = "";
  btn.disabled = true;
  btn.innerText = "Logging in...";

  try{
    const res = await fetch(API+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email:email.value,
        password:password.value
      })
    });

    const data = await res.json();

    if(res.ok && data.token){
      localStorage.setItem("token",data.token);
      msg.innerText="Login successful... redirecting";
      setTimeout(()=>{
        window.location="dashboard.html";
      },800);
    } else {
      msg.innerText = data.message || "Invalid credentials";
    }

  } catch(err){
    msg.innerText = "Network error";
  }

  btn.disabled = false;
  btn.innerText = "Login";
}
</script>

<script src="notify.js"></script><script src="nav.js"></script></body>
</html>
