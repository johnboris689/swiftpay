<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay Register</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;
}

/* top bar */
.top{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}

/* center content */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* title */
h1{
  font-size:34px;
  margin-top:30px;
}

p{
  opacity:0.9;
  font-size:14px;
  line-height:1.5;
}

/* form */
input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.15);
  color:white;
}

input::placeholder{
  color:#e8f7ff;
}

/* button */
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:white;
  color:#0ea5e9;
  font-weight:800;
  font-size:16px;
}

/* footer text */
.footer{
  text-align:center;
  margin-top:18px;
  font-size:14px;
}

a{
  color:white;
  font-weight:700;
}
</style>

</head>

<body>

<div class="top">
  <span>←</span>
  <span>You Need Help?</span>
</div>

<div class="container">

  <h1>SWIFTPAY</h1>
  <h2>Welcome!</h2>

  <p>
    Get your account ready and instantly start buying, selling airtime and data online and start paying all your bills in cheaper price.
  </p>

  <input id="name" type="text" placeholder="Your Full Name">
  <input id="email" type="email" placeholder="Your Email">
  <input id="password" type="password" placeholder="Password">

  <p style="font-size:12px;opacity:0.85;">
    Any further actions indicates that you agree with our terms & conditions!
  </p>

  <button onclick="register()">Create account</button>

  <div class="footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>

</div>

<script>
const API = "/api";

async function register(){

  if(!name.value || !email.value || !password.value){
    alert("All fields required");
    return;
  }

  const res = await fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(res.ok){
    alert("Account created successfully");
    window.location = "login.html";
  } else {
    alert(data.message || "Registration failed");
  }
}
</script>

<script src="notify.js"></script><script src="nav.js"></script></body>
</html>
