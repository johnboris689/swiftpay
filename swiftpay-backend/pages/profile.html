<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay Profile</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f4fbff;
}

.header{
  height:180px;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
}

.avatar{
  width:80px;
  height:80px;
  background:white;
  color:#0ea5e9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:bold;
  margin-top:10px;
}

.container{
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.row{
  margin-top:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.logout{
  margin-top:20px;
  background:#ef4444;
  color:white;
  padding:12px;
  border:none;
  width:100%;
  border-radius:12px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar">SP</div>
  <h2>SwiftPay User</h2>
</div>

<div class="container">

<div class="card">

<div class="row"><b>Full Name:</b> David John</div>
<div class="row"><b>Email:</b> talkdavidjohn@gmail.com</div>
<div class="row"><b>Account Level:</b> Basic</div>
<div class="row"><b>Theme:</b> Sky Blue</div>

</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>
function logout(){
  localStorage.removeItem("token");
  window.location="login.html";
}
</script>

<script src="notify.js"></script><script src="nav.js"></script></body>
</html>
