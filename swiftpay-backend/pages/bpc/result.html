<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay - Success</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#eaf7ff,#f4fbff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:90%;
  max-width:420px;
  background:white;
  border-radius:22px;
  padding:25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

/* SUCCESS ICON */
.check{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#0ea5e9;
  color:white;
  font-size:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:10px auto;
  animation:pop 0.5s ease;
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

/* TITLE */
h2{
  color:#0ea5e9;
  margin:10px 0;
}

/* TEXT */
p{
  color:gray;
  font-size:13px;
}

/* BOX */
.box{
  background:#f4fbff;
  padding:12px;
  border-radius:12px;
  margin-top:15px;
  font-size:14px;
}

/* BUTTONS */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:30px;
  background:#0ea5e9;
  color:white;
  font-weight:800;
  cursor:pointer;
}

button.secondary{
  background:#111;
}
</style>
</head>

<body>

<div class="card">

  <div class="check">✓</div>

  <h2>BPC Purchase Successful</h2>
  <p>Your transaction was completed successfully</p>

  <div class="box">
    <b>Amount:</b> ₦10,000<br>
    <b>Status:</b> Successful<br>
    <b>Reference:</b> SWP-BC-2026
  </div>

  <button onclick="copyCode()">Copy BPC Code</button>

  <button class="secondary" onclick="goWhatsApp()">
    Send Confirmation on WhatsApp
  </button>

</div>

<script>
function copyCode(){
  navigator.clipboard.writeText("BPC-901308");
  alert("BPC Code copied!");
}

function goWhatsApp(){
  window.location.href =
  "https://wa.me/2347078871604?text=I%20have%20made%20the%20transfer";
}
</script>

<script>
const d=JSON.parse(localStorage.getItem("bpc_result")||"{}");
document.body.innerHTML+="<h3>Status: "+(d.status||"SUCCESS")+"</h3><p>Amount: ₦"+(d.amount||10000)+"</p>";
</script>
</body>
</html>
