<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Processing Payment - SwiftPay</title>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#eaf7ff,#f4fbff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:420px;
background:white;
border-radius:22px;
padding:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.loader{
width:70px;
height:70px;
border-radius:50%;
border:6px solid #e6f0f7;
border-top:6px solid #0ea5e9;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.count{
font-size:42px;
font-weight:900;
color:#0ea5e9;
}
</style>
</head>

<body>

<div class="card">
<h2>Processing Payment</h2>

<div class="loader"></div>

<div class="count" id="count">10</div>

<p id="status">Preparing transaction...</p>
</div>

<script>
let time=10;

const count=document.getElementById("count");
const status=document.getElementById("status");

const timer=setInterval(()=>{

time--;
count.innerText=time;

if(time===7){
status.innerText="Verifying payment...";
}

if(time===4){
status.innerText="Generating BPC details...";
}

if(time===2){
status.innerText="Finalizing...";
}

if(time<=0){
clearInterval(timer);
window.location.href="bank.html";
}

},1000);
</script>

</body>
</html>
