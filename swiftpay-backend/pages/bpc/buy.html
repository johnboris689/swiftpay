<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay BPC Purchase</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#eaf7ff,#f4fbff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* MAIN CARD */
.card{
  width:90%;
  max-width:420px;
  background:white;
  border-radius:22px;
  padding:22px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

/* TITLE */
h2{
  margin:0;
  color:#0ea5e9;
  font-size:26px;
}

/* SUBTEXT */
p{
  color:gray;
  font-size:13px;
  margin-top:5px;
}

/* PRICE BOX */
.price{
  margin-top:15px;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;
  font-weight:800;
  text-align:center;
}

/* INPUTS */
input{
  width:100%;
  padding:13px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #e6f0f7;
  outline:none;
  font-size:14px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#0ea5e9;
  color:white;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
  transition:0.2s ease;
}

button:active{
  transform:scale(0.96);
  opacity:0.9;
}

/* LOADING */
.loading{
  display:none;
  margin-top:10px;
  font-size:13px;
  color:#0ea5e9;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

  <h2>Buy BPC Code</h2>
  <p>Secure SwiftPay checkout gateway</p>

  <div class="price">Fixed Price: ₦10,000</div>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email Address">

  <button onclick="startBPC()">Pay & Get BPC Code</button>

  <div class="loading" id="loading">Processing payment...</div>

</div>

<script>
localStorage.setItem("bpc_tx",Date.now());window.location.href="countdown.html";

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  if(!name || !email){
    alert("All fields required");
    return;
  }

  document.getElementById("loading").style.display = "block";

  setTimeout(()=>{
    window.location.href = "countdown.html";
  }, 1200);
}
</script>

</body>
</html>
