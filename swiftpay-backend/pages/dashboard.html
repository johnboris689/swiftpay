<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay Dashboard V3</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#eaf7ff,#f4fbff);
  padding-bottom:90px;
  animation:fadeBody 0.6s ease;
}

@keyframes fadeBody{
  from{opacity:0;}
  to{opacity:1;}
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:white;
  padding:25px 20px;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
  animation:slideDown 0.6s ease;
}

@keyframes slideDown{
  from{transform:translateY(-20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.header h2{margin:0;}
.header p{opacity:0.9;font-size:13px;}

/* BALANCE CARD */
.card{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  animation:pop 0.6s ease;
  position:relative;
  overflow:hidden;
}

@keyframes pop{
  from{transform:scale(0.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.card::after{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(14,165,233,0.1),transparent);
  animation:glow 4s infinite linear;
}

@keyframes glow{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.balance{
  font-size:34px;
  font-weight:900;
  color:#0ea5e9;
  transition:0.5s;
}

/* QUICK ACTIONS */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:20px;
}

.action{
  background:white;
  padding:15px;
  border-radius:18px;
  text-align:center;
  font-size:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  transition:all 0.25s ease;
  cursor:pointer;
  transform:translateY(0);
}

.action:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 25px rgba(0,0,0,0.08);
}

.action:active{
  transform:scale(0.95);
}

/* TRANSACTIONS */
.tx{
  margin:20px;
  background:white;
  padding:15px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  animation:fadeInUp 0.7s ease;
}

@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.tx-item{
  padding:10px;
  border-bottom:1px solid #eee;
  animation:fadeItem 0.4s ease;
}

@keyframes fadeItem{
  from{opacity:0;transform:translateX(-10px);}
  to{opacity:1;transform:translateX(0);}
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:12px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  animation:floatNav 0.8s ease;
}

@keyframes floatNav{
  from{transform:translateY(100px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.nav div{
  font-size:12px;
  text-align:center;
  color:#666;
  cursor:pointer;
  transition:0.2s;
}

.nav div:hover{
  color:#0ea5e9;
  transform:scale(1.1);
}

.nav div:active{
  transform:scale(0.9);
}
.top-right{position:absolute;top:20px;right:20px;display:flex;gap:15px;font-size:22px;z-index:999}
.services{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px}.services div{background:white;padding:18px;border-radius:18px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.05);transition:.2s;cursor:pointer}.services div:active{transform:scale(.95)}
</style>
</head>

<body>

<div class="header">
<div class="top-right"><span onclick="go('notifications')">🔔</span><span onclick="go('profile')">👤</span></div>
  <h2>SwiftPay</h2>
  <p>Welcome back 👋</p>
</div>

<div class="card">
  <p>Available Balance</p>
  <div class="balance" id="balance">₦0</div>
</div>

<div class="actions">
  <div class="action" onclick="go('airtime')">📱 Airtime</div>
  <div class="action" onclick="go('data')">🌐 Data</div>
  <div class="action" onclick="go('bpc')">💳 BPC</div>
  <div class="action" onclick="go('wallet')">💰 Wallet</div>
  <div class="action" onclick="go('profile')">👤 Profile</div>
  <div class="action" onclick="go('support')">💬 Support</div>
</div>

<div class="services"><div onclick="go('airtime')">📱 Airtime</div><div onclick="go('data')">🌐 Data</div><div onclick="go('bpc')">💳 BPC</div><div onclick="go('withdraw')">🏦 Withdraw</div><div onclick="go('profile')">👤 Profile</div><div onclick="go('support')">💬 Support</div></div>
<div class="tx">
  <h3>Recent Transactions</h3>
  <div id="txns"></div>
</div>

<div class="nav">
  <div onclick="go('dashboard')">Home</div>
  <div onclick="go('wallet')">Wallet</div>
  <div onclick="go('bpc')">BPC</div>
  <div onclick="go('profile')">Profile</div>
</div>

<script>
function go(page){
const routes={
airtime:"airtime.html",
data:"data.html",
bpc:"bpc/countdown.html",
wallet:"wallet.html",
profile:"profile.html",
support:"support.html",
withdraw:"withdraw.html",
dashboard:"dashboard.html",
notifications:"notifications.html"
};
window.location.href=routes[page]||"dashboard.html";
}

/* ANIMATED BALANCE */
function animateBalance(value){
  let el = document.getElementById("balance");
  let start = 0;
  let end = value;
  let step = Math.ceil(end / 30);

  let interval = setInterval(()=>{
    start += step;
    if(start >= end){
      start = end;
      clearInterval(interval);
    }
    el.innerText = "₦" + start;
  },20);
}

async function load(){
  const res = await fetch("/api/wallet", {
    headers:{Authorization:localStorage.getItem("token")}
  });

  if(res.ok){
    const data = await res.json();
    animateBalance(data.balance);
  }

  const tx = await fetch("/api/transactions", {
    headers:{Authorization:localStorage.getItem("token")}
  });

  if(tx.ok){
    const list = await tx.json();
    document.getElementById("txns").innerHTML =
      list.slice(0,5).map(t =>
        `<div class="tx-item">
          <b>${t.type}</b><br>
          <small>${new Date(t.date).toLocaleString()}</small>
        </div>`
      ).join("");
  }
}

notify("Welcome to SwiftPay V4");
load();
</script>

<script src="notify.js"></script>
</body>
</html>
