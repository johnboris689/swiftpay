<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwiftPay Dashboard</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f4fbff;
  animation: fadeIn 0.6s ease;
}

/* PAGE FADE */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* TOP BAR */
.topbar{
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  padding:25px;
  color:white;
  border-bottom-left-radius:25px;
  border-bottom-right-radius:25px;
}

/* CONTAINER */
.container{
  padding:15px;
  animation: slideUp 0.6s ease;
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* BALANCE */
.balanceCard{
  background:white;
  padding:20px;
  border-radius:18px;
  margin-top:-25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.3s ease;
}

.balanceCard:hover{
  transform:scale(1.02);
}

.balance{
  font-size:32px;
  font-weight:900;
  color:#0ea5e9;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-3px);
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 -5px 20px rgba(0,0,0,0.08);
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  animation: navUp 0.6s ease;
}

@keyframes navUp{
  from{transform:translateY(60px);}
  to{transform:translateY(0);}
}

/* NAV ITEM */
.nav-item{
  text-align:center;
  font-size:11px;
  color:gray;
  cursor:pointer;
  width:20%;
  transition:0.2s ease;
}

.nav-item:active{
  transform:scale(0.9);
}

/* ACTIVE */
.active{
  color:#0ea5e9;
  font-weight:700;
}

/* ICON */
.icon{
  width:22px;
  height:22px;
  display:block;
  margin:0 auto 3px auto;
  fill:currentColor;
}

/* BUTTON TAP EFFECT */
.tap{
  transition:0.2s ease;
}

.tap:active{
  transform:scale(0.92);
}
</style>
</head>

<body>

<div class="topbar">
  <h2>SwiftPay</h2>
  <p>Welcome back 👋</p>
</div>

<div class="container">

  <div class="balanceCard">
    <p style="font-size:12px;color:gray;">Available Balance</p>
    <div class="balance">₦200,000</div>
    <p id="user">Loading...</p>
  </div>

  <div class="card">
    <h3>Recent Transactions</h3>
    <p style="color:gray;font-size:12px;">No transactions yet</p>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="nav">

  <div class="nav-item active tap" onclick="go('home')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/>
    </svg>
    Home
  </div>

  <div class="nav-item tap" onclick="go('bpc')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M3 6h18v4H3V6zm0 6h18v6H3v-6z"/>
    </svg>
    BPC
  </div>

  <div class="nav-item tap" onclick="go('airtime')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M7 2h10v20H7z"/>
    </svg>
    Airtime
  </div>

  <div class="nav-item tap" onclick="go('data')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M4 4h16v16H4z"/>
    </svg>
    Data
  </div>

  <div class="nav-item tap" onclick="go('withdraw')">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 2l4 7h-3v7h-2V9H8z"/>
    </svg>
    Withdraw
  </div>

</div>

<script>
function go(page){
  const routes = {
    home: "dashboard.html",
    bpc: "bpc/index.html",
    airtime: "airtime.html",
    data: "data.html",
    withdraw: "withdraw.html"
  };

  // smooth transition effect
  document.body.style.opacity = "0.4";

  setTimeout(()=>{
    window.location.href = routes[page] || "dashboard.html";
  },150);
}

/* USER */
const user = JSON.parse(localStorage.getItem("swiftpay_user") || "{}");
document.getElementById("user").innerText =
  user.name ? "Hi, " + user.name : "Welcome User";
</script>

<script src="notify.js"></script>
</body>
</html>
