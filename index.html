<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftPay</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#8B4513,#A0522D);
font-family:Arial;
color:white;
}

.container{
text-align:center;
}

.logo{
width:120px;
height:120px;
background:white;
color:#8B4513;
border-radius:30px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
margin:auto;
}

h1{
margin-top:20px;
}

.loader{
width:50px;
height:50px;
border:5px solid rgba(255,255,255,0.3);
border-top:5px solid white;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.splash{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#8B4513;
color:white;
}

.icon{
width:140px;
height:140px;
border-radius:30px;
overflow:hidden;
background:white;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:20px;
}

.loader{
width:50px;
height:50px;
border:4px solid rgba(255,255,255,.3);
border-top:4px solid white;
border-radius:50%;
margin-top:20px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#8B4513;
overflow:hidden;
}

.splash{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#8B4513;
transition:opacity .6s ease;
}

.logo{
width:120px;
height:120px;
border-radius:30px;
background:white;
color:#8B4513;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
transform:scale(.6);
transition:transform .5s ease;
box-shadow:0 15px 30px rgba(0,0,0,.2);
}

/* Zoom animation */
.logo.zoom{
transform:scale(1.2);
}

/* Pulse animation like fintech apps */
.logo.pulse{
animation:pulse 0.6s ease-in-out 2;
}

@keyframes pulse{
0%{transform:scale(1.2);}
50%{transform:scale(1.35);}
100%{transform:scale(1.2);}
}

/* Fade out splash */
.splash.fade{
opacity:0;
}
</style>

</head>

<body>

<div class="splash" id="splash">

    <div class="logo" id="logo">
        SP
    </div>

</div>

<script>
window.addEventListener("load", () => {

    const logo = document.getElementById("logo");
    const splash = document.getElementById("splash");

    // Step 1: zoom in animation
    setTimeout(() => {
        logo.classList.add("zoom");
    }, 300);

    // Step 2: pulse effect
    setTimeout(() => {
        logo.classList.add("pulse");
    }, 900);

    // Step 3: fade out splash
    setTimeout(() => {
        splash.classList.add("fade");
    }, 1800);

    // Step 4: go to home
    setTimeout(() => {
        window.location.href = "home.html";
    }, 2400);

});
</script>

</body>

</html>
